[build]
  publish = "netlify-site"

# The service worker must never be served stale, or updates would lag a full cache cycle.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
