<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kook vir Jou — offline</title>
<meta name="theme-color" content="#1F2421">
<style>
  body{margin:0; background:#1F2421; color:#F2EFE6; font-family:system-ui, sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; padding:24px;}
  .box{max-width:420px;}
  h1{font-size:26px; color:#C9A227; margin-bottom:10px;}
  p{line-height:1.6; color:#A9B0A5; font-size:15px;}
  button{margin-top:20px; background:#C9A227; color:#1F2421; border:none; font-weight:600; font-size:14px; padding:12px 22px; border-radius:7px; cursor:pointer;}
</style>
</head>
<body>
  <div class="box">
    <h1>You're offline</h1>
    <p>Kook vir Jou needs a connection to reach your household's recipes, pantry and shopping lists — they live safely in the cloud, not on this device. Reconnect and try again.</p>
    <button type="button" onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
